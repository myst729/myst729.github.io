<!DOCTYPE html>
<html>
  {% include head.html %}
  <body>
    <div class="wrap home">
      {% include switch.html %}
      <a class="home-avatar" href="{{ site.herolink | relative_url }}">
        {% include avatar/avatar-animation.svg %}
      </a>
      {% highlight javascript %}{{ site.typeof }}{% endhighlight %}
      <hr>
      <ul class="home-social">
        {% for item in site.social %}
        {% if item.inactive != true %}
        <li>
          <a href="{{ item.url }}" target="_blank">
            {% include icons/{{ item.id }}.svg %}
          </a>
        </li>
        {% endif %}
        {% endfor %}
      </ul>
    </div>
    <script>
      ((win, doc, loc, undef) => {
        const hl = doc.querySelector('.highlight')
        hl.addEventListener('click', (e) => {
          loc.href = '/easter.html'
        }, false)
        hl.addEventListener('dbclick', (e) => {
          loc.href = '/splash.html'
        }, false)
      })(window, document, location)
    </script>
  </body>
</html>
